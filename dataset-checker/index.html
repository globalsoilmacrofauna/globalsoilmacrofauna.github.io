<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#SoilMacroFauna Dataset Checker</title>
    <script
      src="./shinylive/load-shinylive-sw.js"
      type="module"
    ></script>
    <script type="module">
      import { runExportedApp } from "./shinylive/shinylive.js";
      runExportedApp({
        id: "root",
        appEngine: "r",
        relPath: "",
      });
    </script>
    <link rel="stylesheet" href="./shinylive/style-resets.css" />
    <link rel="stylesheet" href="./shinylive/shinylive.css" />
    
  <!-- GSMF_LOADING_OVERLAY_START -->

    <style>
      #gsmf-loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Open Sans", sans-serif;
        text-align: center;
        padding: 24px;
      }
      #gsmf-loading-overlay .gsmf-spinner {
        width: 42px;
        height: 42px;
        border: 4px solid #e0e0e0;
        border-top-color: #5c7a4f;
        border-radius: 50%;
        animation: gsmf-spin 0.9s linear infinite;
        margin-bottom: 18px;
      }
      #gsmf-loading-overlay p {
        color: #444;
        font-size: 0.95rem;
        max-width: 380px;
        margin: 0;
      }
      @keyframes gsmf-spin {
        to { transform: rotate(360deg); }
      }
      #gsmf-loading-overlay.gsmf-hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
    </style>
<!-- GSMF_LOADING_OVERLAY_END -->
</head>
  <body>
<!-- GSMF_LOADING_OVERLAY_START -->

    <div id="gsmf-loading-overlay">
      <div class="gsmf-spinner"></div>
      <p>Loading the data-checking tool&hellip;<br>This can take up to 1 min on your first visit. Thanks for your patience!</p>
    </div>

    <script>
      (function () {
        var overlay = document.getElementById("gsmf-loading-overlay");
        var root = document.getElementById("root");

        function hideOverlay() {
          if (overlay) {
            overlay.classList.add("gsmf-hidden");
            setTimeout(function () {
              if (overlay && overlay.parentNode) {
                overlay.parentNode.removeChild(overlay);
              }
            }, 500);
          }
        }

        var observer = new MutationObserver(function () {
          if (root && root.childNodes.length > 0) {
            hideOverlay();
            observer.disconnect();
          }
        });
        if (root) {
          observer.observe(root, { childList: true, subtree: true });
        }

        // Safety net in case detection fails for any reason
        setTimeout(hideOverlay, 60000);
      })();
    </script>
<!-- GSMF_LOADING_OVERLAY_END -->
    
    <div style="height: 100vh; width: 100vw" id="root"></div>
    
  </body>
</html>
